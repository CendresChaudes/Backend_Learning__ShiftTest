repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: check-yaml
          - id: check-toml
          - id: end-of-file-fixer
          - id: trailing-whitespace
    - repo: local
      hooks:
          - id: black
            name: black
            entry: poetry run black
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: isort
            name: isort
            entry: poetry run isort
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: flake8
            name: flake8
            entry: poetry run flake8
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: mypy
            name: mypy
            entry: poetry run mypy
            language: python
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: interrogate
            name: interrogate
            entry: bash -c 'poetry run interrogate'
            language: system
            types: [python]
    - repo: local
      hooks:
          - id: pytest
            name: pytest
            entry: bash -c 'poetry run pytest'
            language: system
            types: [python]
