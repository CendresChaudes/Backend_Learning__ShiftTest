repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: check-yaml
          - id: check-toml
          - id: end-of-file-fixer
          - id: trailing-whitespace
    - repo: local
      hooks:
          - id: black
            name: black
            entry: bash -c 'files="$(printf "%s\n" "$@" | grep -E "\.py$" | || true)"; [ -z "$files" ] && exit 0; poetry run black $files'
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: isort
            name: isort
            entry: bash -c 'poetry run isort "$@"'
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: flake8
            name: flake8
            entry: bash -c 'poetry run flake8 "$@"'
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: mypy
            name: mypy
            entry: bash -c 'files="$(printf "%s\n" "$@" | grep -E "\.py$" | || true)"; [ -z "$files" ] && exit 0; poetry run mypy $files'
            language: system
            types: [python]
            pass_filenames: true
    - repo: local
      hooks:
          - id: interrogate
            name: interrogate
            entry: bash -c 'poetry run interrogate'
            language: system
            types: [python]
    - repo: local
      hooks:
          - id: pytest
            name: pytest
            entry: bash -c 'poetry run pytest'
            language: system
            types: [python]
